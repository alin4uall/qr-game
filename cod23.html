<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #23</title>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Quicksand:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; animation: pop 0.6s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Chewy', cursive; font-size: clamp(1.8rem, 7vw, 2.8rem); color: white; line-height: 1.25; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .sub { font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">💭</span>
    <div class="message">Keep on dreaming! Codul e pe aproape!</div>
    <div class="sub">// sau poate nu // </div>
  </div>
</body>
</html>
