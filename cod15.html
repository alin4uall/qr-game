<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #15</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(160deg, #f9a825, #f57f17); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 4.5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Pacifico', cursive; font-size: clamp(1.4rem, 5.5vw, 2rem); color: white; line-height: 1.35; margin-bottom: 16px; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .sub { font-size: 0.7rem; color: rgba(255,255,255,0.6); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">😂</span>
    <div class="message">Îți dai seama că toți din jur ne cred nebuni și tu mai ai coduri de scanat?</div>
    <div class="sub">// și totuși scanezi //</div>
  </div>
</body>
</html>
