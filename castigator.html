<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏆 AI CÂȘTIGAT!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }
    /* confetti */
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti span {
      position: absolute;
      top: -20px;
      font-size: 1.5rem;
      animation: confettiFall linear infinite;
    }
    .confetti span:nth-child(1)  { left: 5%;  animation-duration: 3.2s; animation-delay: 0s; }
    .confetti span:nth-child(2)  { left: 12%; animation-duration: 2.8s; animation-delay: 0.3s; }
    .confetti span:nth-child(3)  { left: 22%; animation-duration: 3.5s; animation-delay: 0.1s; }
    .confetti span:nth-child(4)  { left: 33%; animation-duration: 2.6s; animation-delay: 0.5s; }
    .confetti span:nth-child(5)  { left: 44%; animation-duration: 3.0s; animation-delay: 0.2s; }
    .confetti span:nth-child(6)  { left: 55%; animation-duration: 2.9s; animation-delay: 0.7s; }
    .confetti span:nth-child(7)  { left: 66%; animation-duration: 3.3s; animation-delay: 0.4s; }
    .confetti span:nth-child(8)  { left: 77%; animation-duration: 2.7s; animation-delay: 0.1s; }
    .confetti span:nth-child(9)  { left: 88%; animation-duration: 3.1s; animation-delay: 0.6s; }
    .confetti span:nth-child(10) { left: 95%; animation-duration: 2.5s; animation-delay: 0.3s; }
    @keyframes confettiFall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    .card {
      text-align: center;
      padding: 44px 32px;
      max-width: 400px;
      width: 92%;
      position: relative;
      z-index: 1;
      animation: zoomIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes zoomIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .trophy { font-size: 5rem; display: block; margin-bottom: 12px; animation: bounce 1s ease infinite alternate; }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3rem, 12vw, 5rem);
      color: #ffd60a;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(255,214,10,0.5);
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .amount {
      background: linear-gradient(135deg, #ffd60a, #f77f00);
      border-radius: 16px;
      padding: 20px 32px;
      margin-bottom: 28px;
      display: inline-block;
    }
    .amount-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 4rem;
      color: #1a1a2e;
      line-height: 1;
    }
    .amount-label {
      font-size: 0.75rem;
      font-weight: 900;
      color: rgba(26,26,46,0.7);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .btn {
      display: block;
      background: #4caf50;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      box-shadow: 0 8px 24px rgba(76,175,80,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(76,175,80,0.4); }
      50%       { box-shadow: 0 8px 40px rgba(76,175,80,0.7); }
    }
    .btn:active { transform: scale(0.97); }

    .footer {
      margin-top: 20px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="confetti">
    <span>🎊</span><span>🏆</span><span>🎉</span><span>⭐</span><span>🎊</span>
    <span>💰</span><span>🎉</span><span>🏆</span><span>⭐</span><span>🎊</span>
  </div>

  <div class="card">
    <span class="trophy">🏆</span>
    <div class="title">Ai câștigat!</div>
    <div class="subtitle">Felicitări, ai găsit codul secret</div>

    <div class="amount">
      <div class="amount-num">20 LEI</div>
      <div class="amount-label">te așteaptă pe Revolut</div>
    </div>

    <a href="https://revolut.me/p/qfocf99bb2" class="btn">
      💸 Revendică premiul
    </a>

    <div class="footer">cod câștigător · sardinia 2026</div>
  </div>

</body>
</html>
