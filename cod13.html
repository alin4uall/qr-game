<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #13</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #2d2d2d, #1a1a1a); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Lato', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 1px solid #444; border-radius: 12px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 4.5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Oswald', sans-serif; font-size: clamp(1.6rem, 6.5vw, 2.4rem); color: white; line-height: 1.25; margin-bottom: 16px; }
    .sub { font-size: 0.7rem; color: #666; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🫠</span>
    <div class="message">Nimeni nu te-a pus să scanezi. Și totuși ești aici.</div>
    <div class="sub">// existențial, nu? //</div>
  </div>
</body>
</html>
