<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #5</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #f72585, #7209b7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }
    .card {
      text-align: center;
      padding: 44px 32px;
      max-width: 380px;
      width: 92%;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .emoji { font-size: 4.5rem; display: block; margin-bottom: 20px; }
    .message {
      font-family: 'Righteous', cursive;
      font-size: clamp(2rem, 8vw, 3rem);
      color: white;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">😏</span>
    <div class="message">Aproape!<br/>Sau poate nu?</div>
    <div class="sub">// probabilitate: necunoscută //</div>
  </div>
</body>
</html>
