<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #21</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(160deg, #1e3a5f, #0d1b2a); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 1px solid #2d5986; border-radius: 12px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 7vw, 2.8rem); color: #90cdf4; line-height: 1.2; }
    .sub { font-size: 0.65rem; color: #2d5986; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🫣</span>
    <div class="message">Psst... mai caută. E undeva unde nu te-ai uitat încă.</div>
    <div class="sub">// indiciu gratuit //</div>
  </div>
</body>
</html>
