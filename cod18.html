<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #18</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; overflow: hidden; }
    body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 2px solid #7c3aed; position: relative; z-index: 1; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; animation: shake 0.5s ease infinite alternate; }
    @keyframes shake { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }
    .message { font-family: 'Creepster', cursive; font-size: clamp(2rem, 8vw, 3.2rem); color: #a78bfa; line-height: 1.2; letter-spacing: 0.05em; }
    .sub { font-size: 0.65rem; color: #444; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">😈</span>
    <div class="message">Muahahahahaha, tot nimic?</div>
    <div class="sub">// continuă să încerci //</div>
  </div>
</body>
</html>
