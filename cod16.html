<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #16</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; overflow: hidden; }
    body::after { content: '✈️'; position: fixed; font-size: 3rem; animation: fly 4s linear infinite; top: 20%; }
    @keyframes fly { from { left: -60px; } to { left: 110%; } }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 2px solid #e63946; position: relative; z-index: 1; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .tag { font-size: 0.55rem; letter-spacing: 0.25em; color: #e63946; text-transform: uppercase; margin-bottom: 20px; }
    .emoji { font-size: 4.5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 7vw, 2.8rem); color: white; line-height: 1.2; margin-bottom: 16px; }
    .message span { color: #e63946; }
    .sub { font-size: 0.65rem; color: #444; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">⚠️ ALERTĂ DE ZBOR</div>
    <span class="emoji">🤡</span>
    <div class="message">Continuă să scanezi...<br/>poate <span>pierzi avionul.</span></div>
    <div class="sub">// boarding în 10 minute //</div>
  </div>
</body>
</html>
