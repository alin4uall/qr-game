<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #19</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px); animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Righteous', cursive; font-size: clamp(2rem, 8vw, 3rem); color: white; line-height: 1.2; }
    .sub { font-size: 0.65rem; color: #64748b; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🤫</span>
    <div class="message">Psssssst... nu e aici.</div>
    <div class="sub">// mai caută //</div>
  </div>
</body>
</html>
