<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #8</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
    }
    .card {
      max-width: 400px;
      width: 92%;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header {
      background: #d32f2f;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .error-code {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }
    .header-text { color: rgba(255,255,255,0.8); font-size: 0.7rem; letter-spacing: 0.1em; }
    .body { padding: 28px 24px; }
    .message {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1.4rem, 5.5vw, 2rem);
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 20px;
    }
    .error-detail {
      font-size: 0.7rem;
      color: #999;
      line-height: 1.8;
    }
    .error-detail span { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="error-code">⚠️ 404</div>
      <div class="header-text">EROARE DE SISTEM<br/>PREMIU NEGĂSIT</div>
    </div>
    <div class="body">
      <div class="message">Serverul premiului e momentan indisponibil.<br/>Revino în 2031.</div>
      <div class="error-detail">
        <span>ERROR:</span> prize_server.ro nu răspunde<br/>
        <span>STATUS:</span> offline din 2024<br/>
        <span>ETA:</span> aproximativ 7 ani<br/>
        <span>SUGESTIE:</span> du-te la plajă
      </div>
    </div>
  </div>
</body>
</html>
