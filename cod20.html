<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #20</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #c8102e, #009246); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; background: rgba(255,255,255,0.92); border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); animation: pop 0.6s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .emoji { font-size: 4rem; display: block; margin-bottom: 16px; }
    .message { font-family: 'Pacifico', cursive; font-size: clamp(1.5rem, 5.5vw, 2.2rem); color: #c8102e; line-height: 1.3; margin-bottom: 12px; }
    .sub { font-size: 0.7rem; color: #009246; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🍕🍝🥐</span>
    <div class="message">Pizza, Calzone, Paste, Prociuto... yum!</div>
    <div class="sub">// dar premiul tot nu e aici //</div>
  </div>
</body>
</html>
