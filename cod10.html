<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Start Here</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; overflow: hidden; position: relative; }
    body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; }
    .card { text-align: center; padding: 44px 32px; max-width: 400px; width: 92%; border: 2px solid #ffd60a; position: relative; z-index: 1; animation: fadeUp 0.7s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .start-tag { display: inline-block; background: #ffd60a; color: #0d0d0d; font-family: 'Bebas Neue', cursive; font-size: 1rem; letter-spacing: 0.3em; padding: 6px 20px; margin-bottom: 24px; }
    .emoji { font-size: 4rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Bebas Neue', cursive; font-size: clamp(1.6rem, 6vw, 2.2rem); color: #e8e8e8; line-height: 1.3; letter-spacing: 0.04em; }
    .message span { color: #ffd60a; }
    .sub { margin-top: 24px; font-size: 0.65rem; color: #444; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="start-tag">🎯 START HERE</div>
    <span class="emoji">🕵️</span>
    <div class="message">Pe tricouri/bagaje sunt ascunse mai multe coduri QR.<br/><span>Unul singur</span> conține o surpriză.<br/>Scanează-le pe toate și găsește-l.<br/>Spor la căutat!</div>
    <div class="sub">// baftă vei avea nevoie //</div>
  </div>
</body>
</html>
