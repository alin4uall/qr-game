<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #9</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #48cae4 0%, #90e0ef 40%, #f4e4bc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      position: relative;
      overflow: hidden;
    }
    /* waves */
    body::after {
      content: '🌊🌊🌊🌊🌊🌊🌊🌊';
      position: fixed;
      bottom: 0; left: -20px; right: 0;
      font-size: 3rem;
      letter-spacing: 0.5rem;
      animation: wave 3s ease-in-out infinite alternate;
    }
    @keyframes wave {
      from { transform: translateX(0); }
      to   { transform: translateX(-30px); }
    }
    .card {
      text-align: center;
      padding: 44px 32px;
      max-width: 380px;
      width: 92%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;
      animation: pop 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .emoji { font-size: 4.5rem; display: block; margin-bottom: 16px; }
    .message {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      color: #0077b6;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .sub {
      font-size: 0.8rem;
      font-weight: 800;
      color: #f77f00;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">😇</span>
    <div class="message">Săgeata de pe tricou nu înseamnă nimic.</div>
    <div class="sub">Du-te la plajă! 🏖️</div>
  </div>
</body>
</html>
