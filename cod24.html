<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #24</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 1px solid #333; border-radius: 12px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .message { font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 7vw, 2.8rem); color: #e2e8f0; line-height: 1.2; }
    .sub { font-size: 0.65rem; color: #444; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">😴</span>
    <div class="message">La câte coduri ai scanat, premiul deja doarme.</div>
    <div class="sub">// noapte bună //</div>
  </div>
</body>
</html>
