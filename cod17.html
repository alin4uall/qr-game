<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cod #17</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a0a00; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; }
    .card { text-align: center; padding: 44px 32px; max-width: 380px; width: 92%; border: 2px solid #f6ad55; border-radius: 8px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .emoji { font-size: 5rem; display: block; margin-bottom: 20px; }
    .message { font-family: 'Bebas Neue', cursive; font-size: clamp(2rem, 8vw, 3rem); color: #f6ad55; line-height: 1.2; margin-bottom: 12px; }
    .sub { font-size: 0.65rem; color: #555; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🍺</span>
    <div class="message">Ai să-i dai o bere lui Alin!</div>
    <div class="sub">// promisiunea e promisiune //</div>
  </div>
</body>
</html>
